<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello</title>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#ffffff;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

.card{
    text-align:center;
    padding:40px 60px;
    border:1px solid #e5e5e5;
    border-radius:12px;
    box-shadow:0 8px 25px rgba(0,0,0,.05);
}

h1{
    margin:0 0 12px;
    font-size:2rem;
    font-weight:600;
}

p{
    color:#666;
    margin:0;
}
</style>
</head>

<body>

<div class="card">
    <h1>Hello!</h1>
    <p>How's your day going?</p>
</div>

</body>
</html>
